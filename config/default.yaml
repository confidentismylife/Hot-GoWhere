# Single 4090 Configuration — 500~2000 agent evacuation simulation

simulation:
  num_agents: 800              # Agent count (start small, scale up)
  duration: 300                 # Total simulation time (seconds)
  dt: 0.1                       # Physics tick interval (seconds)
  decision_interval: 3.0        # Seconds between agent re-decisions (lower = more responsive)
  seed: 42

environment:
  type: "subway_station"        # subway_station | office_building | stadium
  width: 100.0                  # Meters
  height: 60.0                  # Meters
  disaster: "fire"              # fire | earthquake | flood
  disaster_origin: [15.0, 30.0] # Where the disaster starts (x, y)
  disaster_spread_rate: 0.15    # Meters per second (slower = agents have time to react)
  exit_positions:               # List of exit door positions
    - [5.0, 5.0]                # North exit
    - [95.0, 30.0]              # East exit
    - [5.0, 55.0]               # West exit
    - [50.0, 60.0]              # North-center exit
  obstacles:                    # Static obstacles (pillars, walls, etc.)
    - {center: [25.0, 25.0], radius: 1.5}    # Pillar
    - {center: [25.0, 35.0], radius: 1.5}    # Pillar
    - {center: [50.0, 20.0], radius: 2.0}    # Ticket gate
    - {center: [50.0, 40.0], radius: 2.0}    # Ticket gate
    - {center: [75.0, 30.0], radius: 1.5}    # Pillar
    - {center: [75.0, 20.0], radius: 1.5}    # Pillar
    - {center: [75.0, 40.0], radius: 1.5}    # Pillar

llm:
  model: "Qwen/Qwen2.5-3B-Instruct-AWQ"  # 2GB VRAM with AWQ
  quantization: "awq"           # awq | gptq | none
  max_model_len: 4096
  gpu_memory_utilization: 0.85  # Leave room for other GPU uses
  temperature: 0.3
  max_tokens: 128
  batch_size: 32                # vLLM continuous batching batch size

knowledge_base:
  persist_dir: "./data/disaster_kb"
  embedding_model: "BAAI/bge-small-zh-v1.5"  # Small, fast embedding

agents:
  # Profile distribution
  age_groups:
    young:    {min: 18, max: 35, weight: 0.35}
    middle:   {min: 36, max: 55, weight: 0.45}
    elderly:  {min: 56, max: 80, weight: 0.20}
  familiarity_distribution:     # How well agents know the environment
    low:     {range: [0.0, 0.3], weight: 0.3}
    medium:  {range: [0.3, 0.7], weight: 0.5}
    high:    {range: [0.7, 1.0], weight: 0.2}
  family_group_probability: 0.3  # 30% agents have family members
  max_speed_range: [0.8, 2.0]    # m/s

visualization:
  enabled: true
  width: 1200
  height: 720
  fps: 30

# ================================================================
# v2.0 实验性功能 (开发中)
# ================================================================
# 开启方式: python main.py --config config/default.yaml
# 或在配置中设 enabled: true

vlm:
  enabled: false
  model: "Qwen/Qwen2.5-VL-7B-Instruct-AWQ"   # 开发: AWQ, 实验: FP16
  call_interval: 30                            # 每N tick调用一次

diffusion:
  enabled: false
  d_model: 256
  nhead: 8
  num_layers: 6
  num_inference_steps: 100
  checkpoint: "./checkpoints/diffusion_final.pt"

trajectory_mode: "social_force"  # "social_force" | "diffusion"
